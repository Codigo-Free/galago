name: Build executables

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*.*.*"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            asset_name: galago-linux
            asset_path: dist/galago
          - os: windows-latest
            asset_name: galago-windows
            asset_path: dist/galago.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -e ".[test]" pyinstaller

      - name: Run domain tests
        run: pytest -q

      - name: Build executable
        run: pyinstaller galago.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_path }}

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          mkdir -p release
          cp artifacts/galago-linux/galago release/galago-linux
          chmod +x release/galago-linux
          cp artifacts/galago-windows/galago.exe release/galago-windows.exe

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/galago-linux
            release/galago-windows.exe
